<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkGaai — Hong Kong Smart Parking</title>
    <meta name="description" content="Real-time Hong Kong smart parking meter finder. Find vacant spots, get push alerts, navigate instantly. Free & no login." />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ParkGaai" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        #map { height: 100%; width: 100%; }
        .leaflet-popup-content { max-height: 420px; overflow-y: auto; width: 280px !important; }
        .custom-cluster-marker { transition: all 0.3s ease-in-out; }

        /* Loading overlay */
        #loadingOverlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(255,255,255,0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px;
            transition: opacity 0.4s ease;
        }
        #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 44px; height: 44px; border-radius: 50%;
            border: 4px solid #e2e8f0;
            border-top-color: #10b981;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-hidden h-screen w-screen flex flex-col">

    <!-- Loading overlay (shown while meter data downloads) -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p class="text-sm font-bold text-slate-700">Loading ParkGaai…</p>
        <p id="loadingMsg" class="text-xs text-gray-400">Connecting to data.gov.hk</p>
    </div>

    <header class="bg-white border-b border-gray-200 h-16 px-6 flex justify-between items-center shadow-sm flex-shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🅿️</span>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight text-slate-800 leading-none">
                    Park<span class="text-emerald-600">Gaai</span>
                </h1>
                <p class="text-[10px] text-gray-400 leading-none mt-0.5">香港即時咪錶地圖</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <button id="notifyBtn" onclick="requestNotificationPermission()" class="bg-blue-600 hover:bg-blue-700 text-xs px-3 py-1.5 rounded shadow text-white transition font-medium">
                🔔 Enable Alerts
            </button>
            <span id="refreshStatus" class="text-xs text-gray-400">Initializing...</span>
        </div>
    </header>

    <div class="flex flex-col md:flex-row h-[calc(100vh-64px)] w-full overflow-hidden">

        <aside class="w-full md:w-96 bg-white shadow-lg flex flex-col h-2/5 md:h-full p-4 z-10 overflow-y-auto border-r border-gray-200 flex-shrink-0">

            <div class="mb-4 pb-4 border-b border-gray-200 flex-shrink-0">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                    <span>🚗</span> Vehicle Category Filter (車輛類別)
                </h2>
                <select id="vehicleTypeFilter" onchange="filterVehicleType()" class="border text-xs font-semibold px-2.5 py-2 rounded w-full bg-slate-50 border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="ALL">All Categories (顯示全部車輛)</option>
                </select>
            </div>

            <div class="mb-4 pb-4 border-b border-gray-200 flex-shrink-0">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                    <span>📍</span> Find Nearest Parking Streets
                </h2>
                <div class="flex gap-2">
                    <input id="searchInput" type="text" placeholder="e.g. 厚福街 or Hung Hom"
                           onkeypress="if(event.key === 'Enter') searchLocation()"
                           class="border text-xs px-2.5 py-2 rounded flex-1 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    <button onclick="searchLocation()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 text-xs font-bold rounded shadow transition">
                        Go
                    </button>
                </div>
                <!-- Near Me GPS button -->
                <button id="nearMeBtn" onclick="findNearMe()"
                    class="mt-2 w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2 rounded shadow transition flex items-center justify-center gap-1.5">
                    📡 Near Me — 我附近 (GPS)
                </button>
                <div id="searchResultsContainer" class="mt-3 space-y-2 hidden"></div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider border-b pb-2 flex justify-between items-center flex-shrink-0">
                    <span class="flex items-center gap-1.5">⭐ Tracked Streets Watchlist</span>
                    <span id="watchlistCount" class="text-xs bg-slate-200 text-slate-800 font-bold px-2 py-0.5 rounded-full">0</span>
                </h2>
                <div id="watchlistContainer" class="mt-3 space-y-3 flex-1 overflow-y-auto text-xs text-gray-400 italic">
                    No spaces tracked. Click map pins or search a destination above.
                </div>
            </div>
        </aside>

        <main class="flex-1 h-3/5 md:h-full relative bg-gray-200">
            <div id="map"></div>
        </main>
    </div>

    <script>
        // When deployed on Vercel, /api/spaces and /api/occupancy are rewritten
        // server-side (see vercel.json) — no CORS issues.
        // When running locally (file:// or localhost), fall back to corsproxy.io.
        const _ON_VERCEL    = location.protocol !== 'file:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1';
        const _GOV_SPACES    = "https://resource.data.one.gov.hk/td/psiparkingspaces/spaceinfo/parkingspaces.csv";
        const _GOV_OCCUPANCY = "https://resource.data.one.gov.hk/td/psiparkingspaces/occupancystatus/occupancystatus.csv";
        const SPACES_INFO_URL  = _ON_VERCEL ? "/api/spaces"    : "https://corsproxy.io/?url=" + encodeURIComponent(_GOV_SPACES);
        const OCCUPANCY_URL    = _ON_VERCEL ? "/api/occupancy" : "https://corsproxy.io/?url=" + encodeURIComponent(_GOV_OCCUPANCY);

        let map;
        let parkingMeters = {};
        let occupancyState = {};
        let markerClusterGroup;
        let searchMarker = null;
        let cachedMarkersMap = {};

        let watchlist     = JSON.parse(localStorage.getItem('hk_meter_watchlist') || '[]');
        let userComments  = JSON.parse(localStorage.getItem('hk_meter_comments')  || '{}');
        let brokenSensors = JSON.parse(localStorage.getItem('hk_meter_broken')    || '{}');

        const operatingPeriodMap = {
            'A': '星期一至六 (公眾假期除外)：08:00 AM - 12:00 AM<br>Mon-Sat (Excl. PH): 08:00 AM - 12:00 AM',
            'B': '星期一至六 (公眾假期除外)：08:00 AM - 08:00 PM<br>Mon-Sat (Excl. PH): 08:00 AM - 08:00 PM',
            'D': '星期一至六 (公眾假期除外)：08:00 AM - 12:00 AM<br>星期日及公眾假期：10:00 AM - 10:00 PM<br>Mon-Sat (Excl. PH): 08:00 AM - 12:00 AM<br>Sun & PH: 10:00 AM - 10:00 PM',
            'F': '每日 (包括公眾假期)：08:00 AM - 09:00 PM<br>Daily (Incl. PH): 08:00 AM - 09:00 PM',
            'H': '每日 (包括公眾假期)：08:00 AM - 08:00 PM<br>Daily (Incl. PH): 08:00 AM - 08:00 PM',
            'J': '每日 (包括公眾假期)：08:00 AM - 12:00 AM<br>Daily (Incl. PH): 08:00 AM - 12:00 AM',
            'N': '每日 (包括公眾假期)：07:00 PM - 12:00 AM<br>Daily (Incl. PH): 07:00 PM - 12:00 AM',
            'P': '星期一至六：08:00 AM - 08:00 PM (星期日除外)<br>Mon-Sat: 08:00 AM - 08:00 PM (No Sun Parking)',
            'Q': '星期一至六 (公眾假期除外)：08:00 AM - 08:00 PM<br>星期日及公眾假期：10:00 AM - 10:00 PM<br>Mon-Sat (Excl. PH): 08:00 AM - 08:00 PM<br>Sun & PH: 10:00 AM - 10:00 PM',
            'S': '星期一至五：05:00 PM - 12:00 AM / 星期六：08:00 AM - 12:00 AM / 星期日及公眾假期：10:00 AM - 10:00 PM<br>Mon-Fri: 05:00 PM - 12:00 AM / Sat: 08:00 AM - 12:00 AM / Sun & PH: 10:00 AM - 10:00 PM',
            'T': '星期一至五：05:30 PM - 12:00 AM / 星期六：08:00 AM - 12:00 AM / 星期日及公眾假期：10:00 AM - 10:00 PM<br>Mon-Fri: 05:30 PM - 12:00 AM / Sat: 08:00 AM - 12:00 AM / Sun & PH: 10:00 AM - 10:00 PM'
        };

        function getOperatingHours(code) {
            if (!code) return 'Refer to local roadside signs. (請參閱路旁標誌)';
            let cleanCode = code.toUpperCase().trim().replace(/^[0-9]/, '');
            return operatingPeriodMap[cleanCode] || operatingPeriodMap[code.toUpperCase().trim()] || `Schedule Code ${code} (請參閱路旁標誌)`;
        }

        function formatMaxTimeStr(minutesSet) {
            if (!minutesSet || minutesSet.size === 0) return 'Unknown';
            const sortedMins = Array.from(minutesSet).map(Number).sort((a, b) => b - a);
            const formatted = sortedMins.map(mins => {
                if (mins === 120) return '2 Hrs';
                if (mins === 60)  return '1 Hr';
                if (mins === 30)  return '0.5 Hr';
                return `${(mins / 60).toFixed(1).replace('.0', '')} Hrs`;
            });
            return formatted.join(' / ');
        }

        const vehicleTypeMap = {
            'A': 'Private Car / Van / Taxi (私家車 / 輕型貨車 / 的士)',
            'G': 'Goods Vehicle (貨車)',
            'C': 'Coach / Bus (巴士 / 旅遊巴士)',
            'D': 'Disabled Space (殘疾人士專用)'
        };
        const vehicleShortMap = { 'A': '🚗 Car', 'G': '🚚 Goods', 'C': '🚌 Bus', 'D': '♿ Disabled' };

        function getVehicleTypeName(code) {
            if (!code) return 'Unknown (未知)';
            return vehicleTypeMap[code.toUpperCase().trim()] || `${code} (Other / 其他車輛)`;
        }
        function getVehicleShortName(code) {
            if (!code) return '❓ Unknown';
            return vehicleShortMap[code.toUpperCase().trim()] || `🚘 ${code}`;
        }

        const greenIcon  = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',  shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25,41], iconAnchor: [12,41], popupAnchor: [1,-34], shadowSize: [41,41] });
        const redIcon    = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25,41], iconAnchor: [12,41], popupAnchor: [1,-34], shadowSize: [41,41] });
        const orangeIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25,41], iconAnchor: [12,41], popupAnchor: [1,-34], shadowSize: [41,41] });
        const goldIcon   = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png',   shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25,41], iconAnchor: [12,41], popupAnchor: [1,-34], shadowSize: [41,41] });

        function setLoadingMsg(msg) {
            const el = document.getElementById('loadingMsg');
            if (el) el.innerText = msg;
        }
        function hideLoading() {
            const el = document.getElementById('loadingOverlay');
            if (el) {
                el.classList.add('hidden');
                setTimeout(() => el.remove(), 400);
            }
            // Tell Leaflet to recalculate map size now that overlay is gone
            if (map) map.invalidateSize();
        }

        window.addEventListener('DOMContentLoaded', async () => {
            initMap();
            updateWatchlistUI();
            setLoadingMsg('Downloading meter locations…');
            await loadStaticMeterData();
            populateVehicleTypeDropdown();
            setLoadingMsg('Syncing live sensor data…');
            await fetchRealtimeOccupancy();
            hideLoading();
            handleDeepLink();
            setInterval(fetchRealtimeOccupancy, 60000);
        });

        function initMap() {
            map = L.map('map', { preferCanvas: true }).setView([22.3193, 114.1694], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);

            markerClusterGroup = L.markerClusterGroup({
                chunkedLoading: true,
                maxClusterRadius: 45,
                iconCreateFunction: function(cluster) {
                    const markers = cluster.getAllChildMarkers();
                    let clusterHasVacancy = false;
                    for (let i = 0; i < markers.length; i++) {
                        if (markers[i].options.isVacant && !brokenSensors[markers[i].options.meterId]) {
                            clusterHasVacancy = true;
                            break;
                        }
                    }
                    const colorClass = clusterHasVacancy ? 'bg-green-600' : 'bg-red-600';
                    const ringClass  = clusterHasVacancy ? 'border-green-300 bg-green-500/20' : 'border-red-300 bg-red-500/20';
                    return L.divIcon({
                        html: `<div class="w-10 h-10 rounded-full flex items-center justify-center p-1 ${ringClass} border shadow-inner custom-cluster-marker"><div class="w-8 h-8 rounded-full ${colorClass} text-white flex items-center justify-center font-bold text-xs shadow-md">${markers.length}</div></div>`,
                        className: 'custom-cluster-wrapper',
                        iconSize: L.point(40, 40)
                    });
                }
            });
            map.addLayer(markerClusterGroup);
        }

        function requestNotificationPermission() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    document.getElementById('notifyBtn').innerText = "✅ Alerts Enabled";
                    document.getElementById('notifyBtn').classList.replace('bg-blue-600', 'bg-green-600');
                }
            });
        }

        function cleanGovernmentCsv(text) {
            const headerIndex = text.indexOf("ParkingSpaceId");
            if (headerIndex !== -1) {
                const lastNewline = text.lastIndexOf("\n", headerIndex);
                return text.substring(lastNewline + 1);
            }
            return text;
        }

        const CACHE_KEY = 'parkgaai_static_v1';   // new key — avoids stale v6.2 format
        const CACHE_TTL = 24 * 60 * 60 * 1000;    // 24 hours in ms
        // One-time cleanup: remove old v6.2 cache key if present
        localStorage.removeItem('hk_meters_static_cache_v7');

        async function loadStaticMeterData() {
            // Load from cache only if it exists AND is less than 24 hours old
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (raw) {
                    const { ts, data } = JSON.parse(raw);
                    if (Date.now() - ts < CACHE_TTL) {
                        parkingMeters = data;
                        document.getElementById('refreshStatus').innerText = "Loaded cached map grids.";
                        return;
                    }
                }
            } catch (e) { /* corrupted cache — fall through to fresh download */ }

            document.getElementById('refreshStatus').innerText = "Downloading map grids...";
            try {
                const res = await fetch(SPACES_INFO_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                let csvText = await res.text();
                csvText = cleanGovernmentCsv(csvText);

                // Wrap Papa.parse in a Promise so we truly await completion
                await new Promise((resolve) => {
                    Papa.parse(csvText, {
                        header: true, skipEmptyLines: true,
                        complete: (results) => {
                            results.data.forEach(row => {
                                if (row.ParkingSpaceId && row.Latitude && row.Longitude) {
                                    parkingMeters[row.ParkingSpaceId] = {
                                        id:       row.ParkingSpaceId,
                                        lat:      parseFloat(row.Latitude),
                                        lng:      parseFloat(row.Longitude),
                                        street:   row.Street_tc || row.Street || "Unknown Street",
                                        district: row.District_tc || row.District || "",
                                        type:     row.VehicleType || "A",
                                        maxTime:  row.LPP || "120",
                                        opPeriod: row.OperatingPeriod || "D",
                                        timeUnit: row.TimeUnit || "15",
                                        fee:      row.PaymentUnit || "4.00"
                                    };
                                }
                            });
                            try {
                                localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: parkingMeters }));
                            } catch (_) { /* storage full — skip cache */ }
                            resolve();
                        },
                        error: () => resolve()
                    });
                });
            } catch (err) {
                console.error("Static data fault: ", err);
                document.getElementById('refreshStatus').innerText = "⚠️ Load error — check connection.";
            }
        }

        function populateVehicleTypeDropdown() {
            const selectEl = document.getElementById('vehicleTypeFilter');
            selectEl.innerHTML = '<option value="ALL">All Categories (顯示全部車輛)</option>';
            let uniqueTypes = new Set();
            Object.values(parkingMeters).forEach(meter => {
                if (meter.type) uniqueTypes.add(meter.type.toUpperCase().trim());
            });
            uniqueTypes.forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                option.innerText = getVehicleTypeName(type);
                selectEl.appendChild(option);
            });
        }

        window.filterVehicleType = function() {
            renderMapMarkers();
            updateWatchlistUI();
            if (searchMarker) {
                const centerLoc = searchMarker.getLatLng();
                calculateNearestMeters(centerLoc.lat, centerLoc.lng);
            }
        };

        async function fetchRealtimeOccupancy() {
            document.getElementById('refreshStatus').innerText = "Syncing live sensors...";
            try {
                const res = await fetch(OCCUPANCY_URL);
                let csvText = await res.text();
                csvText = cleanGovernmentCsv(csvText);

                await new Promise((resolve) => {
                    Papa.parse(csvText, {
                        header: true, skipEmptyLines: true,
                        complete: (results) => {
                            let previousState = { ...occupancyState };
                            results.data.forEach(row => {
                                const spaceId = row.ParkingSpaceId;
                                if (spaceId) {
                                    const currentStatus = row.OccupancyStatus;
                                    occupancyState[spaceId] = currentStatus;
                                    if (watchlist.includes(spaceId) && previousState[spaceId] === 'O' && currentStatus === 'V') {
                                        if (!brokenSensors[spaceId]) { triggerSystemNotification(spaceId); }
                                    }
                                }
                            });
                            renderMapMarkers();
                            updateWatchlistUI();
                            document.getElementById('refreshStatus').innerText = `Sync: ${new Date().toLocaleTimeString()}`;
                            resolve();
                        },
                        error: () => resolve()
                    });
                });
            } catch (err) {
                console.error("Sensor data fault: ", err);
                document.getElementById('refreshStatus').innerText = "Live Sync Error.";
            }
        }

        function renderMapMarkers() {
            markerClusterGroup.clearLayers();
            const markersToInject = [];
            cachedMarkersMap = {};
            const selectedType = document.getElementById('vehicleTypeFilter').value;

            Object.keys(parkingMeters).forEach(id => {
                const data = parkingMeters[id];
                const meterTypeUpper = data.type.toUpperCase().trim();
                if (selectedType !== 'ALL' && meterTypeUpper !== selectedType) return;

                const status   = occupancyState[id] || 'O';
                const isVacant = status === 'V';
                const isWatched = watchlist.includes(id);

                let activeIcon = isVacant ? greenIcon : redIcon;
                if (brokenSensors[id]) { activeIcon = orangeIcon; }

                const watchBtnText  = isWatched ? "🔕 Stop Tracking" : "🔔 Track Spot";
                const watchBtnClass = isWatched ? "bg-red-500 text-white" : "bg-blue-600 text-white";

                const googleMapsLink = `https://maps.google.com/maps?daddr=${data.lat},${data.lng}`;
                const shareLink = `${location.origin}${location.pathname}?meter=${id}&lat=${data.lat}&lng=${data.lng}`;

                let commentsHtml = "";
                if (userComments[id] && userComments[id].length > 0) {
                    userComments[id].forEach(cmt => {
                        commentsHtml += `<div class="bg-gray-100 text-[11px] p-1.5 rounded text-gray-700 border-l-2 border-amber-500 break-words">${cmt}</div>`;
                    });
                } else {
                    commentsHtml = `<p class="text-[11px] text-gray-400 italic">No driver notes left.</p>`;
                }

                const popupHtml = `
                    <div class="font-sans text-sm w-full">
                        <h3 class="font-bold text-gray-900 text-sm">${data.street}</h3>
                        <p class="text-[11px] text-gray-400 mb-1">ID: <span class="font-mono font-bold">${id}</span></p>
                        <p class="text-[11px] text-slate-600 font-medium mb-1.5">Type: ${getVehicleTypeName(data.type)}</p>

                        <div class="flex items-center gap-1.5 mb-2.5">
                            <span class="px-2 py-0.5 text-xs font-bold rounded ${isVacant ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${isVacant ? '● Vacant' : '● Occupied'}
                            </span>
                            ${brokenSensors[id] ? '<span class="bg-amber-100 text-amber-800 text-[10px] px-1.5 py-0.5 rounded font-bold">⚠️ Flagged Broken</span>' : ''}
                        </div>

                        <div class="mb-3 text-[11px] text-slate-600 bg-slate-50 border border-slate-200 p-2 rounded space-y-1 leading-tight">
                            <p class="font-bold text-slate-800 border-b pb-0.5 mb-1 flex items-center gap-1">🪙 Meter Rules (收費資情)</p>
                            <p>🕐 <b>Hours:</b><br><span class="text-slate-700 font-medium">${getOperatingHours(data.opPeriod)}</span></p>
                            <p>💰 <b>Rate:</b> HK$${parseFloat(data.fee).toFixed(2)} / ${data.timeUnit} mins (每 ${data.timeUnit} 分鐘)</p>
                            <p>🚗 <b>Max Duration:</b> ${data.maxTime} mins (最長停車 ${data.maxTime} 分鐘)</p>
                        </div>

                        <div class="flex flex-col space-y-1.5 border-b pb-2.5 mb-2.5">
                            <div class="grid grid-cols-2 gap-1.5">
                                <a href="${googleMapsLink}" target="_blank" class="bg-emerald-600 text-center text-white font-bold text-xs py-1.5 rounded shadow hover:bg-emerald-700 transition">
                                    🗺️ Navigate
                                </a>
                                <button onclick="shareSpot('${id}','${shareLink}')" class="bg-slate-100 text-slate-700 font-bold text-xs py-1.5 rounded shadow hover:bg-slate-200 transition border border-slate-200">
                                    🔗 Share Spot
                                </button>
                            </div>
                            <div class="grid grid-cols-2 gap-1">
                                <button onclick="toggleWatchspace('${id}')" class="${watchBtnClass} font-semibold text-[11px] py-1.5 rounded transition">
                                    ${watchBtnText}
                                </button>
                                <button onclick="watchEntireStreet('${data.street}')" class="bg-slate-700 text-white font-semibold text-[11px] py-1.5 rounded hover:bg-slate-800 transition">
                                    🏘️ Watch Block
                                </button>
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold text-gray-700">💬 Driver Updates</span>
                                <button onclick="toggleSensorFlag('${id}')" class="text-[10px] underline ${brokenSensors[id] ? 'text-blue-600 font-bold' : 'text-red-500'}">
                                    ${brokenSensors[id] ? 'Clear Fault Flag' : '❌ Report Wrong Signal'}
                                </button>
                            </div>
                            <div class="max-h-20 overflow-y-auto space-y-1 my-1">
                                ${commentsHtml}
                            </div>
                            <div class="flex gap-1 mt-1">
                                <input id="input-${id}" type="text" placeholder="Add tip..." class="border text-xs px-2 py-1 rounded flex-1 bg-gray-50 focus:outline-none" />
                                <button onclick="submitComment('${id}')" class="bg-gray-200 text-gray-700 px-2 py-1 text-xs rounded hover:bg-gray-300 font-medium">Post</button>
                            </div>
                        </div>
                    </div>
                `;

                const marker = L.marker([data.lat, data.lng], { icon: activeIcon, isVacant: isVacant, meterId: id }).bindPopup(popupHtml);
                markersToInject.push(marker);
                cachedMarkersMap[id] = marker;
            });

            markerClusterGroup.addLayers(markersToInject);
        }

        window.findNearMe = function() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser.');
                return;
            }
            const btn = document.getElementById('nearMeBtn');
            btn.innerText = '📡 Locating…';
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    map.setView([lat, lng], 16);

                    if (searchMarker) map.removeLayer(searchMarker);
                    searchMarker = L.marker([lat, lng], { icon: goldIcon })
                        .addTo(map)
                        .bindPopup('<b>📡 Your Location</b>')
                        .openPopup();

                    calculateNearestMeters(lat, lng);
                    btn.innerText = '📡 Near Me — 我附近 (GPS)';
                    btn.disabled = false;
                },
                function() {
                    alert('Could not get your location. Please allow location access and try again.');
                    btn.innerText = '📡 Near Me — 我附近 (GPS)';
                    btn.disabled = false;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        };

        async function searchLocation() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            document.getElementById('refreshStatus').innerText = "Locating target...";
            try {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ", Hong Kong")}&limit=1`;
                const response = await fetch(url, { headers: { 'User-Agent': 'HK-Smart-Meter-Finder' } });
                const data = await response.json();

                if (data && data.length > 0) {
                    const targetLat = parseFloat(data[0].lat);
                    const targetLng = parseFloat(data[0].lon);
                    map.setView([targetLat, targetLng], 16);

                    if (searchMarker) map.removeLayer(searchMarker);
                    searchMarker = L.marker([targetLat, targetLng], { icon: goldIcon }).addTo(map)
                        .bindPopup(`<b>📍 Destination:</b><br><span class="text-xs text-gray-600">${data[0].display_name}</span>`).openPopup();

                    calculateNearestMeters(targetLat, targetLng);
                } else {
                    alert("Location not found. Try variations including regional keywords.");
                }
            } catch (err) {
                console.error("Nominatim parse fault: ", err);
            } finally {
                document.getElementById('refreshStatus').innerText = `Sync: ${new Date().toLocaleTimeString()}`;
            }
        }

        function calculateNearestMeters(targetLat, targetLng) {
            const targetLatLng = L.latLng(targetLat, targetLng);
            let streetGroups = {};
            const selectedType = document.getElementById('vehicleTypeFilter').value;

            Object.keys(parkingMeters).forEach(id => {
                const meter = parkingMeters[id];
                const meterTypeUpper = meter.type.toUpperCase().trim();
                if (selectedType !== 'ALL' && meterTypeUpper !== selectedType) return;

                const streetName = meter.street;
                const status     = occupancyState[id] || 'O';
                const isVacant   = status === 'V';
                const distance   = targetLatLng.distanceTo(L.latLng(meter.lat, meter.lng));

                if (!streetGroups[streetName]) {
                    streetGroups[streetName] = { street: streetName, total: 0, vacant: 0, minDistance: Infinity, lat: meter.lat, lng: meter.lng, maxTimes: new Set() };
                }

                streetGroups[streetName].total++;
                streetGroups[streetName].maxTimes.add(meter.maxTime);
                if (isVacant && !brokenSensors[id]) streetGroups[streetName].vacant++;
                if (distance < streetGroups[streetName].minDistance) {
                    streetGroups[streetName].minDistance = distance;
                    streetGroups[streetName].lat = meter.lat;
                    streetGroups[streetName].lng = meter.lng;
                }
            });

            let sortedStreets = Object.values(streetGroups);
            sortedStreets.sort((a, b) => a.minDistance - b.minDistance);
            displaySearchResults(sortedStreets.slice(0, 5));
        }

        function displaySearchResults(results) {
            const container = document.getElementById('searchResultsContainer');
            container.classList.remove('hidden');
            container.innerHTML = `<p class="text-[11px] font-bold text-slate-500 mb-1">Nearest Matching Street Blocks:</p>`;

            if (results.length === 0) {
                container.innerHTML += `<p class="text-xs text-gray-400 italic">No matching spaces nearby.</p>`;
                return;
            }

            results.forEach(group => {
                const distanceString = group.minDistance < 1000 ? `${Math.round(group.minDistance)}m` : `${(group.minDistance / 1000).toFixed(1)}km`;
                const hasVacancy     = group.vacant > 0;
                const badgeClass     = hasVacancy ? 'bg-green-100 text-green-800 border-green-200' : 'bg-red-100 text-red-800 border-red-200';
                const googleMapsLink = `https://maps.google.com/maps?daddr=${group.lat},${group.lng}`;
                const durationStr    = formatMaxTimeStr(group.maxTimes);

                container.innerHTML += `
                    <div onclick="focusOnStreet('${encodeURIComponent(group.street)}')" class="bg-slate-50 hover:bg-blue-50 border border-slate-200 p-2.5 rounded shadow-sm cursor-pointer flex flex-col transition text-xs space-y-2">
                        <div class="flex justify-between items-center w-full">
                            <span class="font-bold text-gray-800 truncate max-w-[65%]">${group.street} <span class="text-[10px] text-slate-500 font-medium">(${durationStr})</span></span>
                            <span class="text-[10px] font-semibold text-blue-600 flex-shrink-0">📍 ${distanceString} away</span>
                        </div>
                        <div class="flex justify-between items-center w-full text-[11px]">
                            <span class="text-gray-500">Total Size: <b>${group.total}</b> spots</span>
                            <span class="px-2 py-0.5 border rounded font-bold text-[10px] ${badgeClass}">${group.vacant} Vacant</span>
                        </div>
                        <div class="grid grid-cols-2 gap-1.5 pt-1.5 border-t border-slate-200">
                            <a href="${googleMapsLink}" target="_blank" onclick="event.stopPropagation();" class="bg-emerald-600 text-center text-white font-bold text-[11px] py-1 rounded shadow hover:bg-emerald-700 transition">
                                🗺️ Start GPS
                            </a>
                            <button onclick="event.stopPropagation(); watchEntireStreet('${group.street}');" class="bg-blue-600 text-white font-bold text-[11px] py-1 rounded shadow hover:bg-blue-700 transition">
                                ⭐ Favorite Block
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        window.focusOnStreet = function(encodedStreetName) {
            const streetName = decodeURIComponent(encodedStreetName);
            let bounds = L.latLngBounds();
            let matchedCount = 0;
            const selectedType = document.getElementById('vehicleTypeFilter').value;
            Object.keys(parkingMeters).forEach(id => {
                const meter = parkingMeters[id];
                if (meter.street === streetName) {
                    const meterTypeUpper = meter.type.toUpperCase().trim();
                    if (selectedType !== 'ALL' && meterTypeUpper !== selectedType) return;
                    bounds.extend([meter.lat, meter.lng]);
                    matchedCount++;
                }
            });
            if (matchedCount > 0) { map.fitBounds(bounds, { maxZoom: 18, padding: [40, 40] }); }
        };

        window.watchEntireStreet = function(streetName) {
            const selectedType = document.getElementById('vehicleTypeFilter').value;
            Object.keys(parkingMeters).forEach(id => {
                const meter = parkingMeters[id];
                if (meter.street === streetName) {
                    const meterTypeUpper = meter.type.toUpperCase().trim();
                    if (selectedType !== 'ALL' && meterTypeUpper !== selectedType) return;
                    if (!watchlist.includes(id)) { watchlist.push(id); }
                }
            });
            localStorage.setItem('hk_meter_watchlist', JSON.stringify(watchlist));
            renderMapMarkers();
            updateWatchlistUI();
        };

        window.unwatchEntireStreet = function(encodedStreetName) {
            const streetName   = decodeURIComponent(encodedStreetName);
            const selectedType = document.getElementById('vehicleTypeFilter').value;
            watchlist = watchlist.filter(id => {
                const meter = parkingMeters[id];
                if (!meter) return false;
                if (meter.street === streetName) {
                    const meterTypeUpper = meter.type.toUpperCase().trim();
                    if (selectedType !== 'ALL' && meterTypeUpper !== selectedType) return true;
                    return false;
                }
                return true;
            });
            localStorage.setItem('hk_meter_watchlist', JSON.stringify(watchlist));
            renderMapMarkers();
            updateWatchlistUI();
        };

        window.toggleSensorFlag = function(id) {
            if (brokenSensors[id]) { delete brokenSensors[id]; } else {
                brokenSensors[id] = true;
                const logMsg = `[Flagged incorrect at ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}]`;
                if (!userComments[id]) userComments[id] = [];
                userComments[id].unshift(logMsg);
            }
            localStorage.setItem('hk_meter_broken', JSON.stringify(brokenSensors));
            localStorage.setItem('hk_meter_comments', JSON.stringify(userComments));
            map.closePopup();
            renderMapMarkers();
            updateWatchlistUI();
        };

        window.submitComment = function(id) {
            const inputEl = document.getElementById(`input-${id}`);
            if (!inputEl || !inputEl.value.trim()) return;
            const timeStamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const formattedComment = `(${timeStamp}) ${inputEl.value.trim()}`;
            if (!userComments[id]) userComments[id] = [];
            userComments[id].unshift(formattedComment);
            localStorage.setItem('hk_meter_comments', JSON.stringify(userComments));
            map.closePopup();
            renderMapMarkers();
            updateWatchlistUI();
        };

        window.toggleWatchspace = function(id) {
            if (watchlist.includes(id)) { watchlist = watchlist.filter(item => item !== id); } else { watchlist.push(id); }
            localStorage.setItem('hk_meter_watchlist', JSON.stringify(watchlist));
            renderMapMarkers();
            updateWatchlistUI();
        };

        function updateWatchlistUI() {
            const container    = document.getElementById('watchlistContainer');
            let watchedStreets = {};
            const selectedType = document.getElementById('vehicleTypeFilter').value;

            watchlist.forEach(id => {
                const meta = parkingMeters[id];
                if (!meta) return;
                const meterTypeUpper = meta.type.toUpperCase().trim();
                if (selectedType !== 'ALL' && meterTypeUpper !== selectedType) return;

                const streetName = meta.street;
                const status     = occupancyState[id] || 'O';
                const isVacant   = status === 'V' && !brokenSensors[id];

                if (!watchedStreets[streetName]) {
                    watchedStreets[streetName] = { street: streetName, totalTracked: 0, vacantCount: 0, lat: meta.lat, lng: meta.lng, types: new Set(), maxTimes: new Set() };
                }
                watchedStreets[streetName].totalTracked++;
                watchedStreets[streetName].maxTimes.add(meta.maxTime);
                watchedStreets[streetName].types.add(meta.type.toUpperCase().trim());
                if (isVacant) watchedStreets[streetName].vacantCount++;
            });

            const streetArray = Object.values(watchedStreets);
            document.getElementById('watchlistCount').innerText = streetArray.length;

            if (streetArray.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-400 italic">No spaces tracked. Click map markers to watch individual meters or entire blocks.</p>`;
                return;
            }

            container.innerHTML = "";
            streetArray.forEach(group => {
                const isBlockVacant  = group.vacantCount > 0;
                const badgeColor     = isBlockVacant ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
                const googleMapsLink = `https://maps.google.com/maps?daddr=${group.lat},${group.lng}`;
                const durationStr    = formatMaxTimeStr(group.maxTimes);

                let typeBadgesHtml = '';
                group.types.forEach(t => {
                    typeBadgesHtml += `<span class="bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded text-[10px] font-bold tracking-tight shadow-sm">${getVehicleShortName(t)}</span>`;
                });

                container.innerHTML += `
                    <div onclick="focusOnStreet('${encodeURIComponent(group.street)}')" class="bg-slate-50 hover:bg-blue-50 border border-slate-200 p-2.5 rounded shadow-sm flex flex-col space-y-2.5 cursor-pointer transition">
                        <div class="w-full flex justify-between items-start">
                            <div class="truncate max-w-[65%]">
                                <p class="font-bold text-gray-800 text-xs truncate mb-1">${group.street} <span class="text-[10px] text-slate-500 font-medium">(${durationStr})</span></p>
                                <div class="flex flex-wrap gap-1 mt-1">${typeBadgesHtml}</div>
                            </div>
                            <div class="flex flex-col items-end gap-1 flex-shrink-0">
                                <span class="text-[10px] font-bold px-1.5 py-0.5 rounded flex-shrink-0 ${badgeColor}">
                                    ${isBlockVacant ? `${group.vacantCount} Vacant` : 'Full'}
                                </span>
                                <p class="text-[9px] text-slate-400 font-medium">Size: ${group.totalTracked} spots</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-1.5 pt-1.5 border-t border-slate-200">
                            <a href="${googleMapsLink}" target="_blank" class="bg-emerald-600 text-center text-white font-bold text-[11px] py-1 rounded shadow hover:bg-emerald-700 transition" onclick="event.stopPropagation();">
                                🗺️ Start GPS
                            </a>
                            <button onclick="event.stopPropagation(); unwatchEntireStreet('${encodeURIComponent(group.street)}')" class="text-red-500 hover:text-red-700 text-[11px] font-bold text-right pr-1">
                                Remove Street
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // Share a specific meter spot
        window.shareSpot = function(id, url) {
            if (navigator.share) {
                const meter = parkingMeters[id];
                navigator.share({
                    title: 'ParkGaai — Parking Spot',
                    text: `Check out this parking spot on ${meter ? meter.street : 'HK'} via ParkGaai!`,
                    url: url
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('✅ Link copied to clipboard!\n' + url);
                }).catch(() => {
                    prompt('Copy this link:', url);
                });
            }
        };

        // On page load: if a ?meter=ID deep link is present, fly to that meter and open its popup
        function handleDeepLink() {
            const params = new URLSearchParams(location.search);
            const meterId = params.get('meter');
            const lat     = parseFloat(params.get('lat'));
            const lng     = parseFloat(params.get('lng'));
            if (meterId && !isNaN(lat) && !isNaN(lng)) {
                map.setView([lat, lng], 18);
                // Wait briefly for markers to render, then open the popup
                setTimeout(() => {
                    const marker = cachedMarkersMap[meterId];
                    if (marker) marker.openPopup();
                }, 2000);
            }
        }

        // Register service worker for PWA support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }

        function triggerSystemNotification(spaceId) {
            const data       = parkingMeters[spaceId];
            const streetName = data ? data.street : "A watched spot";
            if (Notification.permission === "granted") {
                new Notification("🚗 Parking Spot Open!", {
                    body: `${streetName} is now empty! Tap to navigate via Google Maps.`,
                    icon: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png"
                });
            }
        }
    </script>
</body>
</html>
